<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>FB ID Extractor</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; border: 1px solid #ccc; padding: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #0056b3; }
        #output { background: #f4f4f4; padding: 15px; border: 1px solid #ddd; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h3>ফেসবুক লিঙ্ক পেস্ট করুন (প্রতি লাইনে একটি):</h3>
    <textarea id="inputLinks" placeholder="https://www.facebook.com/profile.php?id=61570760795796"></textarea>
    <br>
    <button onclick="extractIDs()">আইডি আলাদা করুন</button>
    <button onclick="copyToClipboard()" style="background:#28a745;">সব আইডি কপি করুন</button>

    <h4>ফলাফল (শিটে পেস্ট করার উপযোগী):</h4>
    <div id="output"></div>

    <script>
        function extractIDs() {
            const input = document.getElementById('inputLinks').value;
            const regex = /(?:id=)(\d+)/g;
            let match;
            let results = [];

            while ((match = regex.exec(input)) !== null) {
                results.push(match[1]);
            }

            document.getElementById('output').innerText = results.join('\n');
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("আইডিগুলো কপি হয়েছে! এখন শিটে পেস্ট করতে পারেন।");
            });
        }
    </script>

</body>
</html>
